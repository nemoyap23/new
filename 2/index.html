<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>甘特圖（可拖拉版）</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  padding: 20px;
}

h2 { margin-bottom: 16px; }

/* 外層 */
.wrapper {
  overflow-x: auto;
  border: 1px solid #ddd;
  background: white;
}

/* 表格 */
.table {
  border-collapse: collapse;
  min-width: 1600px;
}

.table th, .table td {
  border: 1px solid #eee;
  font-size: 12px;
  padding: 4px;
}

.task-col {
  width: 180px;
  background: #fafafa;
  font-weight: bold;
}

/* 日期列 */
.date-row th {
  min-width: 30px;
  text-align: center;
}

/* bar 容器 */
.timeline {
  position: relative;
  height: 32px;
}

/* bar */
.bar {
  position: absolute;
  height: 20px;
  top: 6px;
  border-radius: 6px;
}

/* 進度 */
.progress {
  height: 100%;
  background: rgba(0,0,0,0.2);
  border-radius: 6px;
}

/* 顏色 */
.dev { background: #4A90E2; }
.training { background: #50E3C2; }
.launch { background: #F5A623; }

/* 拖拉效果 */
.dragging {
  opacity: 0.5;
}

</style>
</head>

<body>

<h2>自動化媒合系統甘特圖</h2>

<div class="wrapper">
<table class="table">
  <thead>
    <tr class="date-row">
      <th class="task-col">任務</th>
      <th id="dates"></th>
    </tr>
  </thead>
  <tbody id="taskBody"></tbody>
</table>
</div>

<script>

// ===== 日期設定 =====
const start = new Date("2026-04-01");
const end = new Date("2026-05-31");

// ===== 任務 =====
let tasks = [
  { name:"系統內測", start:"2026-04-01", end:"2026-04-25", progress:60, class:"dev"},
  { name:"教育訓練", start:"2026-04-15", end:"2026-05-10", progress:30, class:"training"},
  { name:"SOP 文件", start:"2026-04-10", end:"2026-05-15", progress:40, class:"training"},
  { name:"上線準備", start:"2026-05-10", end:"2026-05-30", progress:10, class:"launch"},
  { name:"正式上線", start:"2026-05-31", end:"2026-05-31", progress:0, class:"launch"}
];

// ===== 算天數 =====
function diffDays(a,b){
  return (b-a)/(1000*60*60*24);
}

const totalDays = diffDays(start,end)+1;

// ===== 產日期列 =====
const dateRow = document.getElementById("dates");
let dateHTML = '<div style="display:flex;">';

let d = new Date(start);
while(d <= end){
  dateHTML += `<div style="width:30px;text-align:center;">${d.getMonth()+1}/${d.getDate()}</div>`;
  d.setDate(d.getDate()+1);
}
dateHTML += '</div>';
dateRow.innerHTML = dateHTML;


// ===== render 任務 =====
const body = document.getElementById("taskBody");

function render(){

  body.innerHTML = "";

  tasks.forEach((t, index)=>{

    const s = new Date(t.start);
    const e = new Date(t.end);

    const offset = diffDays(start,s);
    const length = diffDays(s,e)+1;

    const left = offset * 30;
    const width = length * 30;

    const row = document.createElement("tr");
    row.draggable = true;

    row.innerHTML = `
      <td class="task-col">${t.name}<br>${t.progress}%</td>
      <td>
        <div class="timeline">
          <div class="bar ${t.class}" 
               style="left:${left}px; width:${width}px;">
            <div class="progress" style="width:${t.progress}%"></div>
          </div>
        </div>
      </td>
    `;

    // ===== 拖拉 =====
    row.addEventListener("dragstart", ()=>{
      row.classList.add("dragging");
      row.dataset.index = index;
    });

    row.addEventListener("dragend", ()=>{
      row.classList.remove("dragging");
    });

    row.addEventListener("dragover",(e)=>{
      e.preventDefault();
    });

    row.addEventListener("drop",(e)=>{
      const from = document.querySelector(".dragging").dataset.index;
      const to = index;

      const moved = tasks.splice(from,1)[0];
      tasks.splice(to,0,moved);

      render();
    });

    body.appendChild(row);
  });

}

render();

</script>

</body>
</html>
